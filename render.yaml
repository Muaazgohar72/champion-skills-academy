services:
  - type: web
    name: champion-skills-api
    runtime: node
    plan: free
    region: oregon
    rootDir: artifacts/api-server
    buildCommand: cd ../.. && npx --yes pnpm install --frozen-lockfile=false && npx --yes pnpm --filter @workspace/api-server run build
    startCommand: npx --yes pnpm --filter @workspace/api-server run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: champion-skills-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: ADMIN_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://championskillsacademy.netlify.app

databases:
  - name: champion-skills-db
    plan: free
    region: oregon
