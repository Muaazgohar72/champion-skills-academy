kind = "web"
previewPath = "/"
title = "Champion Skills Academy"
version = "1.0.0"
id = "artifacts/champion-skills"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 23004

[services.development]
run = "pnpm --filter @workspace/champion-skills run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/champion-skills", "run", "build" ]
publicDir = "artifacts/champion-skills/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "23004"
BASE_PATH = "/"
